services:
  app:
    build: .
    ports:
      - "3001:3000"
    volumes:
      - ./data:/app/data
      - /dev/input:/dev/input
    device_cgroup_rules:
      - 'c 13:* rmw'
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/stock.db
      - TZ=Asia/Tokyo
      # auto=自動検出, or /dev/input/by-id/usb-XXXX-event-kbd
      - SCANNER_DEVICE=auto
    restart: unless-stopped
