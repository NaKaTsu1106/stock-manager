<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>在庫管理</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h1 id="page-title">スキャン</h1>
        <span class="scanner-indicator disconnected" id="scanner-indicator" title="スキャナー未接続"></span>
      </div>
    </header>
    <main id="main"></main>
    <nav id="nav">
      <a href="#scan" class="nav-item active" data-page="scan">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10M12 7v10"/></svg>
        <span>スキャン</span>
      </a>
      <a href="#equipment" class="nav-item" data-page="equipment">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4M4 7l8 4M4 7v10l8 4m0-10v10"/></svg>
        <span>機材</span>
      </a>
      <a href="#history" class="nav-item" data-page="history">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>履歴</span>
      </a>
      <a href="#settings" class="nav-item" data-page="settings">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>設定</span>
      </a>
    </nav>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div id="modal-content"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/js/api.js"></script>
  <script src="/js/scan.js"></script>
  <script src="/js/equipment.js"></script>
  <script src="/js/history.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
